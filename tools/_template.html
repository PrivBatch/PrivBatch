<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <!-- TOOL: update title, description, canonical -->
  <title>TOOL NAME - Free, Private, Offline | PrivBatch</title>
  <meta name="description" content="TOOL DESCRIPTION. Runs 100% in your browser - no uploads, no accounts, instant results.">
  <link rel="canonical" href="https://privbatch.com/tools/TOOL-SLUG.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/light-mode.css">

  <script src="../js/config.js"></script>
  <script src="../js/gold-standard.js"></script>
  <!-- TOOL: add CDN scripts here if needed (Papa Parse, SheetJS, etc.) -->
  <style>
    /* ── Page chrome ── */
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* ── Tool title bar ── */
    .tool-header {
      position: relative; z-index: 1;
      background: var(--bg);
      border-bottom: 1px solid var(--border-s);
      flex-shrink: 0;
    }
    .tool-header-inner {
      max-width: 1400px; margin: 0 auto;
      padding: 10px 24px;
      display: flex; align-items: center; gap: 16px;
    }
    .tool-title {
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.5px; color: var(--text-1);
    }
    .tool-header-spacer { flex: 1; }
    .tool-badge {
      font-family: var(--mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.08em; color: var(--text-3);
      text-transform: uppercase;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
    }
    .tool-badge::before {
      content: ''; width: 4px; height: 4px;
      border-radius: 50%; background: var(--accent); opacity: 0.7;
    }

    /* ── Settings bar ── */
    .settings-bar {
      position: relative; z-index: 96;
      background: rgba(22,19,34,0.98);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 44px;
      display: flex; align-items: center; gap: 16px;
      overflow: visible; flex-shrink: 0;
    }

    .sbar-group  { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .sbar-label  { font-family: var(--mono); font-size: 10px; color: var(--text-3); white-space: nowrap; }
    .sbar-sep    { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    .sbar-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .sbar-mode-btn {
      font-family: var(--mono); font-size: 10px; font-weight: 600;
      padding: 4px 10px; cursor: pointer; border: none;
      background: transparent; color: var(--text-3);
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .sbar-mode-btn.active { background: rgba(167,139,250,0.15); color: var(--accent); }
    .sbar-mode-sep { width: 1px; background: var(--border); }

    .sbar-select {
      font-family: var(--mono); font-size: 10px;
      background: rgba(167,139,250,0.06);
      border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-1); padding: 3px 7px;
      outline: none; cursor: pointer; transition: border-color 0.15s;
    }
    .sbar-select:focus { border-color: var(--accent); }

    .sbar-pill {
      width: 26px; height: 14px; background: var(--accent-d);
      border-radius: 99px; position: relative; cursor: pointer; flex-shrink: 0;
    }
    .sbar-pill::after {
      content: ''; position: absolute;
      width: 10px; height: 10px; background: #fff; border-radius: 50%;
      top: 2px; right: 2px; transition: all 0.18s;
    }
    .sbar-pill.off { background: var(--text-3); }
    .sbar-pill.off::after { right: auto; left: 2px; }

    /* ── Tool layout ── */
    .tool-layout {
      display: grid;
      grid-template-columns: var(--left-w, 420px) 8px 1fr;
      max-width: 1400px; width: 100%;
      margin: 0 auto; padding: 12px 24px;
      box-sizing: border-box; gap: 0;
      align-items: stretch; position: relative; z-index: 1;
    }

    .panel-resizer {
      display: flex; align-items: flex-start;
      justify-content: center; padding-top: 20px;
      cursor: col-resize; user-select: none; z-index: 10;
    }
    .panel-resizer::after {
      content: ''; width: 2px; height: 32px;
      background: var(--border); border-radius: 1px;
      transition: background 0.15s;
    }
    .panel-resizer:hover::after  { background: rgba(167,139,250,0.4); }
    .panel-resizer.dragging::after { background: var(--accent); }

    .left-panel   { display: flex; flex-direction: column; overflow: hidden; }
    .right-col    { display: flex; flex-direction: column; }
    .output-panel { display: flex; flex-direction: column; overflow: hidden; }

    .output-body {
      height: 300px; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .output-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--text-3);
      font-family: var(--mono); font-size: 11px;
    }
    .output-empty-icon { font-size: 32px; opacity: 0.25; }

    .output-footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border-s);
      display: flex; align-items: center; gap: 16px; flex-shrink: 0;
    }
    .output-stat     { font-family: var(--mono); font-size: 10px; color: var(--text-3); }
    .output-stat .val { color: var(--text-2); }

    /* Stats bar (simple inline version for free tools) */
    .stats-bar {
      font-family: var(--mono); font-size: 10px;
      color: var(--free); padding: 5px 16px;
      display: none; flex-shrink: 0;
      border-top: 1px solid rgba(45,212,191,0.15);
      background: rgba(45,212,191,0.04);
      animation: stats-in 0.25s ease-out;
    }
    .stats-bar.visible { display: block; }
    @keyframes stats-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Keyboard-first focus */
    button:focus-visible, select:focus-visible, input:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      .tool-layout { grid-template-columns: 1fr !important; padding: 8px 16px; }
      .panel-resizer { display: none; }
      .right-col { margin-top: 8px; }
    }

    /* ══════════════════════════════════════════
       TOOL-SPECIFIC STYLES - add below this line
       ══════════════════════════════════════════ */

  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-layer dot-grid" aria-hidden="true">
    <div class="blob blob-tool-1"></div>
    <div class="blob blob-tool-2"></div>
    <div class="blob blob-tool-3"></div>
  </div>

  <!-- Nav header -->
  <header class="header-tool">
    <div class="header-inner">
      <a class="back-link" href="../index.html">&larr; All tools</a>
      <div class="header-sep"></div>
      <a href="../index.html">
        <img src="/assets/logo-horizontal.svg" alt="PrivBatch" height="32">
      </a>
      <!-- TOOL: update tool-crumb name -->
      <span class="tool-crumb" aria-label="Current tool: TOOL NAME">
        <span class="sep">/</span>
        <span class="name">TOOL NAME</span>
      </span>
      <div class="h-spacer"></div>
      <div class="privacy-badge badge-inline">
        <div class="dot" aria-hidden="true"></div>
        100% offline
      </div>
      <input class="license-input" id="license-input" type="text"
             placeholder="&#128273; license key" aria-label="License key">
      <span class="license-unlocked" aria-live="polite"></span>
    </div>
  </header>

  <!-- Tool title bar -->
  <div class="tool-header">
    <div class="tool-header-inner">
      <!-- TOOL: update title -->
      <h1 class="tool-title">TOOL NAME</h1>
      <div class="tool-header-spacer"></div>
      <!-- TOOL: "Free tool" or "Pro batch tool" -->
      <div class="tool-badge" id="tier-badge">Free tool</div>
    </div>
  </div>

  <!-- Options toolbar - GS buttons (Recent, Prove It, Shortcuts) are appended automatically -->
  <div class="settings-bar" role="toolbar" aria-label="Options">

    <!-- TOOL: add tool-specific controls here -->
    <!-- Example:
    <div class="sbar-group">
      <span class="sbar-label">Mode:</span>
      <div class="sbar-toggle">
        <button class="sbar-mode-btn active" id="mode-a">Mode A</button>
        <div class="sbar-mode-sep"></div>
        <button class="sbar-mode-btn" id="mode-b">Mode B</button>
      </div>
    </div>
    <div class="sbar-sep" aria-hidden="true"></div>
    -->

  </div>
  <!-- GS buttons (Recent, Prove It, Shortcuts) appended here by gold-standard.js -->
  <!-- Tier notice (batch tools only) appended here by gold-standard.js -->

  <!-- Main split layout -->
  <div class="tool-layout" id="tool-layout">

    <!-- ═══ LEFT PANEL ═══ -->
    <div class="glass-panel left-panel">

      <!-- TOOL: replace with tool-specific input UI -->

    </div><!-- /left-panel -->

    <!-- ═══ RESIZER ═══ -->
    <div class="panel-resizer" id="panel-resizer" aria-hidden="true"></div>

    <!-- ═══ RIGHT COLUMN ═══ -->
    <div class="right-col">
      <div class="glass-panel output-panel" id="output-panel">

        <div class="panel-header">
          <span class="panel-title panel-title-accent">Output</span>
          <div class="panel-spacer"></div>
          <!-- TOOL: add tool-specific actions before Copy -->
          <button class="panel-action" id="copy-btn" aria-label="Copy output to clipboard">Copy</button>
          <button class="panel-action" id="download-btn" aria-label="Download output">Download</button>
        </div>

        <div class="output-body" id="output-body">
          <div class="output-empty" id="output-empty">
            <!-- TOOL: update empty-state icon + message -->
            <div class="output-empty-icon" aria-hidden="true">{ }</div>
            Paste or load input to see output
          </div>
          <div id="output-area" style="display:none"></div>
        </div>

        <div class="output-footer">
          <!-- TOOL: add relevant stats -->
          <span class="output-stat">Ready</span>
        </div>

      </div>

      <!-- Simple stats bar (free tools) - shown after each processing run -->
      <div class="stats-bar" id="stats-bar" role="status" aria-live="polite"></div>

    </div><!-- /right-col -->

  </div><!-- /tool-layout -->

  <!-- Footer -->
  <footer class="footer-tool">
    <div class="footer-inner">
      <span>© 2026 PrivBatch</span>
      <a href="../privacy.html">Privacy</a>
      <a href="../changelog.html">Changelog</a>
      <a href="../licence.html">Licence</a>
      <span class="footer-note">All processing is local - zero uploads, zero logs</span>
    </div>
  </footer>

  <!-- GS overlays (Prove It panel, Shortcuts, Tool Switcher) injected by gold-standard.js -->

  <!-- ── Libraries ── -->
  <!-- TOOL: add CDN libraries here (PapaParse, SheetJS, etc.) -->
  <script src="../js/utils.js"></script>
  <script src="../js/license.js"></script>

  <script>
  /* ════════════════════════════════════════════════════════
     TOOL NAME - Tool Logic
     ════════════════════════════════════════════════════════ */

  const $ = id => document.getElementById(id);

  /* ── State ── */
  const state = {
    lastOutput: '',
    /* TOOL: add tool-specific state */
  };

  /* ── DOM refs ── */
  const DOM = {
    outputBody:  $('output-body'),
    outputEmpty: $('output-empty'),
    outputArea:  $('output-area'),
    statsBar:    $('stats-bar'),
    copyBtn:     $('copy-btn'),
    downloadBtn: $('download-btn'),
    /* TOOL: add tool-specific refs */
  };

  /* ── Helpers ── */
  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  const showStatsBar = (ms, inBytes, outBytes) =>
    GoldStandard.showStatsBar(DOM.statsBar, ms, inBytes, outBytes);

  /* ── Copy with green flash ── */
  DOM.copyBtn.addEventListener('click', async () => {
    if (!state.lastOutput) return;
    try {
      await navigator.clipboard.writeText(state.lastOutput);
      DOM.copyBtn.textContent = 'Copied!';
      DOM.copyBtn.style.color = '#2DD4BF';
      setTimeout(() => { DOM.copyBtn.textContent = 'Copy'; DOM.copyBtn.style.color = ''; }, 2000);
    } catch (_) {}
  });

  /* ── Panel resizer ── */
  (function () {
    const layout = $('tool-layout'), resizer = $('panel-resizer');
    let startX, startW;
    resizer.addEventListener('mousedown', e => {
      startX = e.clientX;
      startW = parseInt(getComputedStyle(layout).getPropertyValue('--left-w') || '420', 10);
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', e => {
      if (!resizer.classList.contains('dragging')) return;
      layout.style.setProperty('--left-w', Math.min(700, Math.max(260, startW + e.clientX - startX)) + 'px');
    });
    document.addEventListener('mouseup', () => {
      if (!resizer.classList.contains('dragging')) return;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    });
  })();

  /* ════════════════════════════════════════════════════════
     TOOL-SPECIFIC LOGIC - implement below
     ════════════════════════════════════════════════════════ */

  /* TOOL: implement process() - call showStatsBar() and GoldStandard.History.save() */
  function process() {
    const t0 = performance.now();
    const input = ''; /* TOOL: get input value */

    /* ... processing logic ... */

    state.lastOutput = ''; /* TOOL: set to output string */
    GoldStandard.History.save({
      tool: 'TOOL NAME',  /* TOOL: match name in config.js TOOLS array */
      timestamp: Date.now(),
      inputSize: new Blob([input]).size,
    });
    showStatsBar(Math.round(performance.now() - t0), new Blob([input]).size, new Blob([state.lastOutput]).size);
  }

  /* TOOL: implement download */
  function downloadOutput() {
    if (!state.lastOutput) return;
    const blob = new Blob([state.lastOutput], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), { href: url, download: 'output.txt' });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  DOM.downloadBtn.addEventListener('click', downloadOutput);

  /* ── Restore tier on load ── */
  (function () {
    try {
      const raw = localStorage.getItem('privbatch_license');
      if (raw) {
        const stored = JSON.parse(raw);
        if (stored?.tier && stored.tier !== 'free') {
          document.dispatchEvent(new CustomEvent('privbatch:tierchange', { detail: { tier: stored.tier } }));
        }
      }
    } catch (_) {}
  })();

  /* ════════ GOLD STANDARD INIT - always last ════════ */
  GoldStandard.init({
    toolName : 'TOOL NAME',     /* TOOL: match name in config.js TOOLS array */
    tier     : 'free',          /* TOOL: 'free' or 'batch' */
    onConvert : process,        /* TOOL: Ctrl+Enter callback, or null */
    onDownload: downloadOutput, /* TOOL: Ctrl+S callback, or null */
    shortcuts: [
      { keys: ['Ctrl', 'Enter'], desc: 'Process input'      }, /* TOOL: update desc */
      { keys: ['Ctrl', 'S'],     desc: 'Download output'    },
      { keys: ['Ctrl', 'K'],     desc: 'Open tool switcher' },
      { keys: ['Escape'],        desc: 'Close overlay'      },
      { keys: ['?'],             desc: 'Toggle shortcuts'   },
    ],
  });
  </script>
  <script src="../js/oss-page-chrome.js"></script>
</body>
