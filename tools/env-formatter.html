<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <title>.env Formatter - Free, Private, Offline | PrivBatch</title>
  <meta name="description" content="Convert .env files to JSON or YAML and back. Runs 100% in your browser - no uploads, no tracking.">
  <link rel="canonical" href="https://privbatch.com/tools/env-formatter.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/light-mode.css">
  <script src="../js/config.js"></script>
  <script src="../js/gold-standard.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
    .tool-header { position: relative; z-index: 1; background: var(--bg); border-bottom: 1px solid var(--border-s); flex-shrink: 0; }
    .tool-header-inner { max-width: 1400px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
    .tool-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-1); }
    .tool-header-spacer { flex: 1; }
    .tool-badge-free { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--free); display: flex; align-items: center; gap: 5px; }
    .tool-badge-free::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--free); }
    .settings-bar { position: relative; z-index: 96; background: rgba(22,19,34,0.98); border-bottom: 1px solid var(--border); padding: 0 24px; height: 44px; display: flex; align-items: center; gap: 16px; overflow: visible; flex-shrink: 0; }
    .sbar-group { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .sbar-label { font-family: var(--mono); font-size: 10px; color: var(--text-3); white-space: nowrap; }
    .sbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .sbar-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-3); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .sbar-btn:hover { color: var(--text-1); border-color: rgba(167,139,250,0.4); }
    .sbar-btn.active { background: rgba(167,139,250,0.15); color: var(--accent); border-color: rgba(167,139,250,0.4); }
    .sbar-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .sbar-mode-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; cursor: pointer; border: none; background: transparent; color: var(--text-3); transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .sbar-mode-btn.active { background: rgba(167,139,250,0.15); color: var(--accent); }
    .sbar-mode-sep { width: 1px; background: var(--border); }
    .tool-layout { display: grid; grid-template-columns: var(--left-w, 420px) 8px 1fr; max-width: 1400px; width: 100%; margin: 0 auto; padding: 12px 24px; box-sizing: border-box; gap: 0; align-items: stretch; position: relative; z-index: 1; }
    .panel-resizer { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; cursor: col-resize; user-select: none; z-index: 10; }
    .panel-resizer::after { content: ''; width: 2px; height: 32px; background: var(--border); border-radius: 1px; transition: background 0.15s; }
    .panel-resizer:hover::after { background: rgba(167,139,250,0.4); }
    .left-panel { display: flex; flex-direction: column; overflow: hidden; }
    .right-col { display: flex; flex-direction: column; }
    .output-panel { display: flex; flex-direction: column; overflow: hidden; }
    .output-body { height: 300px; overflow-y: auto; display: flex; flex-direction: column; }
    .output-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-3); font-family: var(--mono); font-size: 11px; }
    .output-empty-icon { font-size: 32px; opacity: 0.25; }
    .output-footer { padding: 8px 16px; border-top: 1px solid var(--border-s); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .output-stat { font-family: var(--mono); font-size: 10px; color: var(--text-3); }
    .stats-bar { font-family: var(--mono); font-size: 10px; color: var(--free); padding: 5px 16px; display: none; flex-shrink: 0; animation: stats-in 0.25s ease-out; border-top: 1px solid rgba(45,212,191,0.15); background: rgba(45,212,191,0.04); }
    .stats-bar.visible { display: block; }
    @keyframes stats-in { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
    /* env-specific */
    .input-area { flex: 1; display: flex; flex-direction: column; }
    .input-textarea { flex: 1; min-height: 200px; resize: none; font-family: var(--mono); font-size: 12px; color: var(--text-1); background: transparent; border: none; outline: none; line-height: 1.7; padding: 14px 16px; }
    .input-footer { padding: 8px 12px; border-top: 1px solid var(--border-s); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .input-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-3); transition: all 0.15s; }
    .input-btn:hover { color: var(--text-1); border-color: rgba(167,139,250,0.4); }
    .input-btn.primary { background: var(--accent); color: #0e0b1a; border-color: var(--accent); }
    .input-btn.primary:hover { opacity: 0.85; }
    .input-spacer { flex: 1; }

    .output-pre { flex: 1; padding: 14px 16px; font-family: var(--mono); font-size: 12px; color: var(--text-1); white-space: pre; overflow-x: auto; line-height: 1.7; }
    .error-bar { padding: 8px 16px; background: rgba(239,68,68,0.08); border-top: 1px solid rgba(239,68,68,0.2); font-family: var(--mono); font-size: 11px; color: #EF4444; display: none; }
    .error-bar.visible { display: block; }
  </style>
</head>
<body>

  <div class="bg-layer dot-grid" aria-hidden="true">
    <div class="blob blob-tool-1"></div>
    <div class="blob blob-tool-2"></div>
    <div class="blob blob-tool-3"></div>
  </div>

  <header class="header-tool">
    <div class="header-inner">
      <a class="back-link" href="../index.html">&larr; All tools</a>
      <div class="header-sep"></div>
      <a href="../index.html"><img src="/assets/logo-horizontal.svg" alt="PrivBatch" height="32"></a>
      <span class="tool-crumb"><span class="sep">/</span><span class="name">.env Formatter</span></span>
      <div class="h-spacer"></div>
      <div class="privacy-badge badge-inline"><div class="dot" aria-hidden="true"></div>100% offline</div>
      <input class="license-input" id="license-input" type="text" placeholder="&#128273; license key" aria-label="License key">
      <span class="license-unlocked" aria-live="polite"></span>
    </div>
  </header>

  <div class="tool-header">
    <div class="tool-header-inner">
      <span class="tool-title">.env Formatter</span>
      <div class="tool-header-spacer"></div>
      <span class="tool-badge-free">Free tool · No limits</span>
    </div>
  </div>

  <div class="settings-bar">
    <div class="sbar-group">
      <span class="sbar-label">Mode:</span>
      <div class="sbar-toggle">
        <button class="sbar-mode-btn active" id="mode-env-json">.env → JSON</button>
        <div class="sbar-mode-sep"></div>
        <button class="sbar-mode-btn" id="mode-env-yaml">.env → YAML</button>
        <div class="sbar-mode-sep"></div>
        <button class="sbar-mode-btn" id="mode-json-env">JSON → .env</button>
      </div>
    </div>
    <div class="sbar-sep"></div>
    <!-- GS buttons (Recent, Prove It, Shortcuts) injected by gold-standard.js -->
  </div>

  <div class="tool-layout" id="tool-layout">

    <div class="glass-panel left-panel">
      <div class="panel-header">
        <span class="panel-title" id="input-label">Input (.env)</span>
        <div class="panel-spacer"></div>
      </div>
      <div class="input-area">
        <textarea class="input-textarea" id="input-text" spellcheck="false" autocomplete="off"
          placeholder="DATABASE_URL=postgres://user:pass@localhost/mydb&#10;API_KEY=sk-abc123&#10;DEBUG=true&#10;PORT=3000"></textarea>
      </div>
      <div class="input-footer">
        <button class="input-btn" id="sample-btn">Sample</button>
        <div class="input-spacer"></div>
        <button class="input-btn" id="clear-btn">Clear</button>
        <button class="input-btn primary" id="convert-btn">Convert</button>
      </div>
    </div>

    <div class="panel-resizer" id="panel-resizer" aria-hidden="true"></div>

    <div class="right-col">
      <div class="glass-panel output-panel">
        <div class="panel-header">
          <span class="panel-title panel-title-accent">Output</span>
          <div class="panel-spacer"></div>
          <button class="panel-action" id="copy-btn">Copy</button>
          <button class="panel-action" id="download-btn">Download</button>
          <button class="panel-action" id="expand-btn">Expand &#8597;</button>
        </div>

        <div class="output-body" id="output-body">
          <div class="output-empty" id="output-empty">
            <div class="output-empty-icon">&#9881;</div>
            Paste .env content and convert
          </div>
          <div class="output-pre" id="output-pre" style="display:none"></div>
        </div>

        <div class="error-bar" id="error-bar"></div>
        <div class="output-footer">
          <span class="output-stat" id="out-stat">Ready</span>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar" aria-live="polite"></div>
    </div>

  </div>

  <footer class="footer-tool">
    <div class="footer-inner">
      <span>© 2026 PrivBatch</span>
      <a href="../privacy.html">Privacy</a>
      <a href="../changelog.html">Changelog</a>
      <a href="../licence.html">Licence</a>
      <span class="footer-note">All processing is local - zero uploads, zero logs</span>
    </div>
  </footer>

  <!-- GS overlays (Prove It, Shortcuts, Switcher) injected by gold-standard.js -->

  <script src="../js/license.js"></script>
  <script>
  (function () {
    'use strict';
    const $ = id => document.getElementById(id);

    const DOM = {
      statsBar: $('stats-bar'), copyBtn: $('copy-btn'), downloadBtn: $('download-btn'),
      expandBtn: $('expand-btn'), outputBody: $('output-body'), outputEmpty: $('output-empty'),
      outputPre: $('output-pre'), outStat: $('out-stat'), errorBar: $('error-bar'),
      inputText: $('input-text'), inputLabel: $('input-label'),
    };

    const state = { lastOutput: '', expanded: false, mode: 'env-json' };

    function fmtSize(b) { if (b < 1024) return b + ' B'; if (b < 1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    const showStatsBar = (ms, inB, outB) => GoldStandard.showStatsBar(DOM.statsBar, ms, inB, outB);

    const SAMPLES = {
      'env-json': `# Application
APP_NAME=MyApp
APP_ENV=production
DEBUG=false

# Database
DATABASE_URL=postgres://admin:s3cr3t@db.example.com:5432/myapp
DATABASE_POOL=10

# Auth
JWT_SECRET=super-secret-jwt-key-do-not-share
API_KEY=sk-abc123def456ghi789

# Email
SMTP_HOST=smtp.example.com
SMTP_PORT=587
SMTP_USER=noreply@example.com`,
      'env-yaml': `# Application
APP_NAME=MyApp
APP_ENV=production
DEBUG=false
PORT=3000`,
      'json-env': `{
  "APP_NAME": "MyApp",
  "APP_ENV": "production",
  "DEBUG": "false",
  "DATABASE_URL": "postgres://user:pass@localhost/mydb",
  "API_KEY": "sk-abc123",
  "PORT": "3000"
}`,
    };

    /* .env parser - returns object */
    function parseEnv(text) {
      const obj = {};
      for (const line of text.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#')) continue;
        const eq = trimmed.indexOf('=');
        if (eq === -1) continue;
        const key = trimmed.slice(0, eq).trim();
        let val = trimmed.slice(eq + 1).trim();
        if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) {
          val = val.slice(1, -1);
        }
        if (key) obj[key] = val;
      }
      return obj;
    }

    /* object → .env */
    function objToEnv(obj) {
      return Object.entries(obj).map(([k, v]) => {
        const s = String(v);
        const needsQuote = s.includes(' ') || s.includes('#') || s.includes('"');
        return `${k}=${needsQuote ? '"' + s.replace(/"/g, '\\"') + '"' : s}`;
      }).join('\n');
    }

    function convert() {
      const t0 = performance.now();
      const input = DOM.inputText.value.trim();
      if (!input) { renderEmpty(); return; }

      let result = '', err = '';
      try {
        if (state.mode === 'env-json') {
          result = JSON.stringify(parseEnv(input), null, 2);
        } else if (state.mode === 'env-yaml') {
          result = jsyaml.dump(parseEnv(input), { lineWidth: -1 });
        } else {
          const obj = JSON.parse(input);
          result = objToEnv(obj);
        }
        DOM.errorBar.className = 'error-bar';
      } catch (e) {
        err = e.message;
        DOM.errorBar.textContent = 'Error: ' + err;
        DOM.errorBar.className = 'error-bar visible';
        return;
      }

      state.lastOutput = result;
      DOM.outputEmpty.style.display = 'none';
      DOM.outputPre.style.display = 'block';
      DOM.outputPre.textContent = result;
      DOM.outStat.textContent = fmtSize(new Blob([result]).size) + ' output';
      GoldStandard.History.save({ tool: '.env Formatter', timestamp: Date.now(), inputSize: new Blob([input]).size, mode: state.mode });
      showStatsBar(Math.round(performance.now() - t0), new Blob([input]).size, new Blob([result]).size);
    }

    function renderEmpty() {
      state.lastOutput = '';
      DOM.outputEmpty.style.display = '';
      DOM.outputPre.style.display = 'none';
      DOM.outStat.textContent = 'Ready';
      DOM.statsBar.className = 'stats-bar';
      DOM.errorBar.className = 'error-bar';
    }

    function downloadOutput() {
      if (!state.lastOutput) return;
      const ext = state.mode === 'env-json' ? 'json' : state.mode === 'env-yaml' ? 'yaml' : 'env';
      const blob = new Blob([state.lastOutput], { type: 'text/plain' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a');
      a.href = url; a.download = `output.${ext}`; a.click(); URL.revokeObjectURL(url);
    }

    function setMode(m) {
      state.mode = m;
      ['mode-env-json','mode-env-yaml','mode-json-env'].forEach(id => $(id).classList.remove('active'));
      $('mode-' + m).classList.add('active');
      const labels = { 'env-json': 'Input (.env)', 'env-yaml': 'Input (.env)', 'json-env': 'Input (JSON)' };
      DOM.inputLabel.textContent = labels[m];
      renderEmpty();
    }

    $('mode-env-json').addEventListener('click', () => setMode('env-json'));
    $('mode-env-yaml').addEventListener('click', () => setMode('env-yaml'));
    $('mode-json-env').addEventListener('click', () => setMode('json-env'));
    $('convert-btn').addEventListener('click', convert);
    $('clear-btn').addEventListener('click', () => { DOM.inputText.value = ''; renderEmpty(); });
    $('sample-btn').addEventListener('click', () => { DOM.inputText.value = SAMPLES[state.mode]; convert(); });

    DOM.copyBtn.addEventListener('click', async () => {
      if (!state.lastOutput) return;
      try {
        await navigator.clipboard.writeText(state.lastOutput);
        DOM.copyBtn.textContent = 'Copied!'; DOM.copyBtn.style.color = '#2DD4BF'; DOM.copyBtn.style.borderColor = 'rgba(45,212,191,0.4)';
        setTimeout(() => { DOM.copyBtn.textContent = 'Copy'; DOM.copyBtn.style.color = ''; DOM.copyBtn.style.borderColor = ''; }, 2000);
      } catch (_) {}
    });
    DOM.downloadBtn.addEventListener('click', downloadOutput);
    DOM.expandBtn.addEventListener('click', () => { state.expanded = !state.expanded; DOM.outputBody.style.height = state.expanded ? '650px' : '300px'; DOM.expandBtn.textContent = state.expanded ? 'Collapse ↕' : 'Expand ↕'; });

    (function () {
      const resizer = $('panel-resizer'), layout = $('tool-layout');
      let startX, startW, dragging = false;
      resizer.addEventListener('mousedown', e => { startX = e.clientX; startW = parseInt(getComputedStyle(layout).getPropertyValue('--left-w') || '420', 10); dragging = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
      document.addEventListener('mousemove', e => { if (!dragging) return; layout.style.setProperty('--left-w', Math.min(700, Math.max(260, startW + e.clientX - startX)) + 'px'); });
      document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; });
    })();

    GoldStandard.init({
      toolName : '.env Formatter',
      tier     : 'free',
      onConvert : convert,
      onDownload: downloadOutput,
      shortcuts: [
        { keys: ['Ctrl', 'Enter'], desc: 'Convert / process' },
        { keys: ['Ctrl', 'S'],     desc: 'Download output' },
        { keys: ['Ctrl', 'K'],     desc: 'Open tool switcher' },
        { keys: ['Escape'],        desc: 'Close overlay / clear' },
        { keys: ['?'],             desc: 'Toggle shortcuts' },
      ],
    });

  })();
  </script>
  <script src="../js/oss-page-chrome.js"></script>
</body>
</html>
