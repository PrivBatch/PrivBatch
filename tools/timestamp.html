<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <title>Timestamp Converter - Free, Private, Offline | PrivBatch</title>
  <meta name="description" content="Convert Unix timestamps to human-readable dates and back. Multiple timezones. Runs 100% in your browser.">
  <link rel="canonical" href="https://privbatch.com/tools/timestamp.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/light-mode.css">
  <script src="../js/config.js"></script>
  <script src="../js/gold-standard.js"></script>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; box-sizing: border-box; }
    .tool-header { position: relative; z-index: 1; background: var(--bg); border-bottom: 1px solid var(--border-s); flex-shrink: 0; }
    .tool-header-inner { max-width: 1400px; margin: 0 auto; padding: 10px 24px; display: flex; align-items: center; gap: 16px; }
    .tool-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-1); }
    .tool-header-spacer { flex: 1; }
    .tool-badge-free { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--free); display: flex; align-items: center; gap: 5px; }
    .tool-badge-free::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--free); }
    .settings-bar { position: relative; z-index: 96; background: rgba(22,19,34,0.98); border-bottom: 1px solid var(--border); padding: 0 24px; height: 44px; display: flex; align-items: center; gap: 16px; overflow: visible; flex-shrink: 0; }
    .sbar-group { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
    .sbar-label { font-family: var(--mono); font-size: 10px; color: var(--text-3); white-space: nowrap; }
    .sbar-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    .sbar-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-3); transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .sbar-btn:hover { color: var(--text-1); border-color: rgba(167,139,250,0.4); }
    .sbar-btn.active { background: rgba(167,139,250,0.15); color: var(--accent); border-color: rgba(167,139,250,0.4); }
    .sbar-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .sbar-mode-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 4px 10px; cursor: pointer; border: none; background: transparent; color: var(--text-3); transition: background 0.15s, color 0.15s; white-space: nowrap; }
    .sbar-mode-btn.active { background: rgba(167,139,250,0.15); color: var(--accent); }
    .sbar-mode-sep { width: 1px; background: var(--border); }
    .tool-layout { display: grid; grid-template-columns: var(--left-w, 420px) 8px 1fr; max-width: 1400px; width: 100%; margin: 0 auto; padding: 12px 24px; box-sizing: border-box; gap: 0; align-items: stretch; position: relative; z-index: 1; }
    .panel-resizer { display: flex; align-items: flex-start; justify-content: center; padding-top: 20px; cursor: col-resize; user-select: none; z-index: 10; }
    .panel-resizer::after { content: ''; width: 2px; height: 32px; background: var(--border); border-radius: 1px; transition: background 0.15s; }
    .panel-resizer:hover::after { background: rgba(167,139,250,0.4); }
    .left-panel { display: flex; flex-direction: column; overflow: hidden; }
    .right-col { display: flex; flex-direction: column; }
    .output-panel { display: flex; flex-direction: column; overflow: hidden; }
    .output-body { min-height: 200px; overflow-y: auto; display: flex; flex-direction: column; }
    .output-footer { padding: 8px 16px; border-top: 1px solid var(--border-s); display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .output-stat { font-family: var(--mono); font-size: 10px; color: var(--text-3); }
    .stats-bar { font-family: var(--mono); font-size: 10px; color: var(--free); padding: 5px 16px; display: none; flex-shrink: 0; animation: stats-in 0.25s ease-out; border-top: 1px solid rgba(45,212,191,0.15); background: rgba(45,212,191,0.04); }
    .stats-bar.visible { display: block; }
    @keyframes stats-in { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
    /* Timestamp-specific */
    .ts-inner { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .ts-field { display: flex; flex-direction: column; gap: 6px; }
    .ts-field label { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
    .ts-input { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text-1); background: rgba(167,139,250,0.06); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; outline: none; width: 100%; box-sizing: border-box; transition: border-color 0.15s; }
    .ts-input:focus { border-color: var(--accent); }
    .ts-input.error { border-color: #EF4444; }
    .ts-row { display: flex; gap: 8px; align-items: center; }
    .ts-btn { font-family: var(--mono); font-size: 10px; font-weight: 600; padding: 5px 12px; cursor: pointer; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-3); transition: all 0.15s; white-space: nowrap; }
    .ts-btn:hover { color: var(--accent); border-color: rgba(167,139,250,0.4); }
    .ts-btn.primary { background: var(--accent); color: #0e0b1a; border-color: var(--accent); }
    .ts-btn.primary:hover { opacity: 0.85; }
    .ts-spacer { flex: 1; }
    .ts-error { font-family: var(--mono); font-size: 11px; color: #EF4444; }

    .tz-card { background: rgba(167,139,250,0.04); border: 1px solid rgba(167,139,250,0.1); border-radius: 10px; overflow: hidden; }
    .tz-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid rgba(167,139,250,0.06); }
    .tz-row:last-child { border-bottom: none; }
    .tz-name { font-family: var(--mono); font-size: 10px; color: var(--text-3); min-width: 100px; }
    .tz-val { font-family: var(--mono); font-size: 12px; color: var(--text-1); flex: 1; }
    .tz-copy { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border: 1px solid var(--border); border-radius: 4px; background: transparent; color: var(--text-3); cursor: pointer; transition: all 0.12s; flex-shrink: 0; }
    .tz-copy:hover { color: var(--text-1); border-color: rgba(167,139,250,0.4); }

    .unix-display { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--accent); text-align: center; padding: 16px; letter-spacing: 0.04em; }
    .now-ticker { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-align: center; }
  </style>
</head>
<body>

  <div class="bg-layer dot-grid" aria-hidden="true">
    <div class="blob blob-tool-1"></div>
    <div class="blob blob-tool-2"></div>
    <div class="blob blob-tool-3"></div>
  </div>

  <header class="header-tool">
    <div class="header-inner">
      <a class="back-link" href="../index.html">&larr; All tools</a>
      <div class="header-sep"></div>
      <a href="../index.html"><img src="/assets/logo-horizontal.svg" alt="PrivBatch" height="32"></a>
      <span class="tool-crumb"><span class="sep">/</span><span class="name">Timestamp Converter</span></span>
      <div class="h-spacer"></div>
      <div class="privacy-badge badge-inline"><div class="dot" aria-hidden="true"></div>100% offline</div>
      <input class="license-input" id="license-input" type="text" placeholder="&#128273; license key" aria-label="License key">
      <span class="license-unlocked" aria-live="polite"></span>
    </div>
  </header>

  <div class="tool-header">
    <div class="tool-header-inner">
      <span class="tool-title">Timestamp Converter</span>
      <div class="tool-header-spacer"></div>
      <span class="tool-badge-free">Free tool · No limits</span>
    </div>
  </div>

  <div class="settings-bar">
    <div class="sbar-group">
      <span class="sbar-label">Mode:</span>
      <div class="sbar-toggle">
        <button class="sbar-mode-btn active" id="mode-unix">Unix → Human</button>
        <div class="sbar-mode-sep"></div>
        <button class="sbar-mode-btn" id="mode-human">Human → Unix</button>
      </div>
    </div>
    <div class="sbar-sep"></div>
    <!-- GS buttons (Recent, Prove It, Shortcuts) injected by gold-standard.js -->
  </div>

  <div class="tool-layout" id="tool-layout">

    <div class="glass-panel left-panel">
      <div class="ts-inner">

        <div class="ts-field" id="unix-field">
          <label>Unix Timestamp</label>
          <input class="ts-input" id="unix-input" type="text" placeholder="e.g. 1700000000" spellcheck="false">
          <div class="ts-row">
            <button class="ts-btn" id="now-btn">Now</button>
            <button class="ts-btn" id="now-ms-btn">Now (ms)</button>
            <div class="ts-spacer"></div>
            <button class="ts-btn primary" id="convert-btn">Convert</button>
          </div>
          <div class="now-ticker" id="now-ticker"></div>
        </div>

        <div class="ts-field" id="human-field" style="display:none">
          <label>Date / Time</label>
          <input class="ts-input" id="human-input" type="datetime-local" id="human-input">
          <div class="ts-row">
            <button class="ts-btn" id="now-human-btn">Now</button>
            <div class="ts-spacer"></div>
            <button class="ts-btn primary" id="convert-human-btn">Convert</button>
          </div>
        </div>

        <div id="error-msg" style="display:none" class="ts-error"></div>

      </div>
    </div>

    <div class="panel-resizer" id="panel-resizer" aria-hidden="true"></div>

    <div class="right-col">
      <div class="glass-panel output-panel" id="output-panel">
        <div class="panel-header">
          <span class="panel-title panel-title-accent">Result</span>
          <div class="panel-spacer"></div>
          <button class="panel-action" id="copy-btn">Copy</button>
          <button class="panel-action" id="download-btn">Download</button>
        </div>

        <div class="output-body" id="output-body">
          <div id="unix-result" style="display:none">
            <div class="unix-display" id="unix-out"></div>
          </div>
          <div class="tz-card" id="tz-card" style="display:none; margin: 12px 16px;">
            <div class="tz-row"><span class="tz-name">UTC</span><span class="tz-val" id="tz-utc"></span><button class="tz-copy" data-field="tz-utc">Copy</button></div>
            <div class="tz-row"><span class="tz-name">Local</span><span class="tz-val" id="tz-local"></span><button class="tz-copy" data-field="tz-local">Copy</button></div>
            <div class="tz-row"><span class="tz-name">ISO 8601</span><span class="tz-val" id="tz-iso"></span><button class="tz-copy" data-field="tz-iso">Copy</button></div>
            <div class="tz-row"><span class="tz-name">RFC 2822</span><span class="tz-val" id="tz-rfc"></span><button class="tz-copy" data-field="tz-rfc">Copy</button></div>
            <div class="tz-row"><span class="tz-name">Relative</span><span class="tz-val" id="tz-rel"></span><button class="tz-copy" data-field="tz-rel">Copy</button></div>
            <div class="tz-row"><span class="tz-name">Unix (s)</span><span class="tz-val" id="tz-unix-s"></span><button class="tz-copy" data-field="tz-unix-s">Copy</button></div>
            <div class="tz-row"><span class="tz-name">Unix (ms)</span><span class="tz-val" id="tz-unix-ms"></span><button class="tz-copy" data-field="tz-unix-ms">Copy</button></div>
          </div>
        </div>

        <div class="output-footer">
          <span class="output-stat" id="out-stat">Enter a timestamp and press Convert</span>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar" aria-live="polite"></div>
    </div>

  </div>

  <footer class="footer-tool">
    <div class="footer-inner">
      <span>© 2026 PrivBatch</span>
      <a href="../privacy.html">Privacy</a>
      <a href="../changelog.html">Changelog</a>
      <a href="../licence.html">Licence</a>
      <span class="footer-note">All processing is local - zero uploads, zero logs</span>
    </div>
  </footer>

  <!-- GS overlays (Prove It, Shortcuts, Switcher) injected by gold-standard.js -->

  <script src="../js/license.js"></script>
  <script>
  (function () {
    'use strict';
    const $ = id => document.getElementById(id);

    const DOM = {
      statsBar: $('stats-bar'), copyBtn: $('copy-btn'), downloadBtn: $('download-btn'),
      outStat: $('out-stat'), unixInput: $('unix-input'), humanInput: $('human-input'),
      nowTicker: $('now-ticker'), errorMsg: $('error-msg'),
    };

    const state = { lastOutput: '', mode: 'unix' };

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function showStatsBar(ms) { DOM.statsBar.textContent = `Converted in ${ms}ms · 0 bytes sent to any server`; DOM.statsBar.className = 'stats-bar visible'; }

    function relativeTime(date) {
      const diff = date - Date.now();
      const abs = Math.abs(diff);
      const past = diff < 0;
      if (abs < 60000) return (past ? '' : 'in ') + Math.round(abs / 1000) + 's' + (past ? ' ago' : '');
      const m = Math.round(abs / 60000);
      if (m < 60) return past ? m + 'm ago' : 'in ' + m + 'm';
      const h = Math.round(m / 60);
      if (h < 24) return past ? h + 'h ago' : 'in ' + h + 'h';
      const d = Math.round(h / 24);
      return past ? d + 'd ago' : 'in ' + d + 'd';
    }

    function showResult(date) {
      const unixS  = Math.floor(date.getTime() / 1000);
      const unixMs = date.getTime();
      const utc    = date.toUTCString();
      const local  = date.toLocaleString();
      const iso    = date.toISOString();
      const rfc    = date.toString();
      const rel    = relativeTime(date);

      if (state.mode === 'unix') {
        $('unix-result').style.display = 'none';
      } else {
        $('unix-result').style.display = 'block';
        $('unix-out').textContent = unixS;
      }

      $('tz-utc').textContent    = utc;
      $('tz-local').textContent  = local;
      $('tz-iso').textContent    = iso;
      $('tz-rfc').textContent    = rfc;
      $('tz-rel').textContent    = rel;
      $('tz-unix-s').textContent  = unixS;
      $('tz-unix-ms').textContent = unixMs;
      $('tz-card').style.display = 'block';

      state.lastOutput = `UTC:      ${utc}\nLocal:    ${local}\nISO 8601: ${iso}\nRFC 2822: ${rfc}\nRelative: ${rel}\nUnix (s): ${unixS}\nUnix (ms): ${unixMs}`;
      DOM.outStat.textContent = rel;
      DOM.errorMsg.style.display = 'none';
      DOM.unixInput.classList.remove('error');
    }

    function convertUnix() {
      const t0 = performance.now();
      let raw = DOM.unixInput.value.trim();
      if (!raw) return;
      let n = parseFloat(raw);
      if (isNaN(n)) { showError('Not a valid number'); return; }
      if (n > 1e12) n = n / 1000; /* ms → s */
      const date = new Date(n * 1000);
      if (isNaN(date.getTime())) { showError('Invalid timestamp'); return; }
      showResult(date);
      GoldStandard.History.save({ tool: 'Timestamp Converter', timestamp: Date.now(), inputSize: raw.length, mode: 'unix', value: raw });
      showStatsBar(Math.round(performance.now() - t0));
    }

    function convertHuman() {
      const t0 = performance.now();
      const raw = DOM.humanInput.value;
      if (!raw) return;
      const date = new Date(raw);
      if (isNaN(date.getTime())) { showError('Invalid date/time'); return; }
      showResult(date);
      GoldStandard.History.save({ tool: 'Timestamp Converter', timestamp: Date.now(), inputSize: raw.length, mode: 'human', value: raw });
      showStatsBar(Math.round(performance.now() - t0));
    }

    function showError(msg) {
      DOM.errorMsg.textContent = msg;
      DOM.errorMsg.style.display = 'block';
      DOM.unixInput.classList.add('error');
      $('tz-card').style.display = 'none';
    }

    function downloadOutput() {
      if (!state.lastOutput) return;
      const blob = new Blob([state.lastOutput], { type: 'text/plain' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a');
      a.href = url; a.download = 'timestamp.txt'; a.click(); URL.revokeObjectURL(url);
    }

    function setMode(m) {
      state.mode = m;
      $('mode-unix').classList.toggle('active', m === 'unix');
      $('mode-human').classList.toggle('active', m === 'human');
      $('unix-field').style.display   = m === 'unix'  ? '' : 'none';
      $('human-field').style.display  = m === 'human' ? '' : 'none';
      $('unix-result').style.display  = 'none';
      $('tz-card').style.display      = 'none';
      DOM.errorMsg.style.display      = 'none';
      state.lastOutput = '';
    }

    /* Live ticker */
    function updateTicker() {
      const now = Math.floor(Date.now() / 1000);
      DOM.nowTicker.textContent = 'Current Unix: ' + now;
    }
    setInterval(updateTicker, 1000);
    updateTicker();

    $('now-btn').addEventListener('click', () => { DOM.unixInput.value = Math.floor(Date.now() / 1000); convertUnix(); });
    $('now-ms-btn').addEventListener('click', () => { DOM.unixInput.value = Date.now(); convertUnix(); });
    $('convert-btn').addEventListener('click', convertUnix);
    DOM.unixInput.addEventListener('keydown', e => { if (e.key === 'Enter') convertUnix(); });

    $('now-human-btn').addEventListener('click', () => {
      const now = new Date(); const iso = now.toISOString().slice(0, 16);
      DOM.humanInput.value = iso; convertHuman();
    });
    $('convert-human-btn').addEventListener('click', convertHuman);

    $('mode-unix').addEventListener('click', () => setMode('unix'));
    $('mode-human').addEventListener('click', () => setMode('human'));

    /* Per-row copy buttons */
    document.querySelectorAll('.tz-copy').forEach(btn => {
      btn.addEventListener('click', async () => {
        const el = $(btn.dataset.field);
        if (!el) return;
        await navigator.clipboard.writeText(el.textContent);
        btn.textContent = 'Copied!'; btn.style.color = '#2DD4BF'; btn.style.borderColor = 'rgba(45,212,191,0.4)';
        setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; btn.style.borderColor = ''; }, 2000);
      });
    });

    DOM.copyBtn.addEventListener('click', async () => {
      if (!state.lastOutput) return;
      try {
        await navigator.clipboard.writeText(state.lastOutput);
        DOM.copyBtn.textContent = 'Copied!'; DOM.copyBtn.style.color = '#2DD4BF'; DOM.copyBtn.style.borderColor = 'rgba(45,212,191,0.4)';
        setTimeout(() => { DOM.copyBtn.textContent = 'Copy'; DOM.copyBtn.style.color = ''; DOM.copyBtn.style.borderColor = ''; }, 2000);
      } catch (_) {}
    });
    DOM.downloadBtn.addEventListener('click', downloadOutput);

    (function () {
      const resizer = $('panel-resizer'), layout = $('tool-layout');
      let startX, startW, dragging = false;
      resizer.addEventListener('mousedown', e => { startX = e.clientX; startW = parseInt(getComputedStyle(layout).getPropertyValue('--left-w') || '420', 10); dragging = true; document.body.style.cursor = 'col-resize'; document.body.style.userSelect = 'none'; });
      document.addEventListener('mousemove', e => { if (!dragging) return; layout.style.setProperty('--left-w', Math.min(700, Math.max(260, startW + e.clientX - startX)) + 'px'); });
      document.addEventListener('mouseup', () => { if (!dragging) return; dragging = false; document.body.style.cursor = ''; document.body.style.userSelect = ''; });
    })();

    GoldStandard.init({
      toolName : 'Timestamp Converter',
      tier     : 'free',
      onConvert : () => { convertUnix(); },
      onDownload: downloadOutput,
      shortcuts: [
        { keys: ['Ctrl', 'Enter'], desc: 'Convert / process' },
        { keys: ['Ctrl', 'S'],     desc: 'Download output' },
        { keys: ['Ctrl', 'K'],     desc: 'Open tool switcher' },
        { keys: ['Escape'],        desc: 'Close overlay / clear' },
        { keys: ['?'],             desc: 'Toggle shortcuts' },
      ],
    });

  })();
  </script>
  <script src="../js/oss-page-chrome.js"></script>
</body>
</html>
